apiVersion: apps/v1
kind: Deployment
metadata:
  name: ccgeteway
  labels:
    app: ccgeteway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ccgeteway
  template:
    metadata:
      labels:
        app: ccgeteway
    spec:
      serviceAccountName: ccg-service-account
      terminationGracePeriodSeconds: 35
      containers:
        - name: ccgeteway
          image: ccgeteway:latest
          ports:
            - containerPort: 8080
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: ccgeteway-config
                  key: mysql.host
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ccgeteway-secret
                  key: mysql.user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ccgeteway-secret
                  key: mysql.password
            # AWS 区域配置（Bedrock 可用区域）
            - name: BEDROCK_REGION
              value: "us-east-1"
            # 注意：不需要配置 AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
            # IRSA 会自动通过 ServiceAccount 注入临时凭证
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
