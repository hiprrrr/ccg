# ============================================================================
# ServiceAccount for IRSA (IAM Roles for Service Accounts)
# ============================================================================
# 使用前需要：
# 1. 创建 IAM Role，信任策略允许 EKS OIDC Provider
# 2. IAM Role 需要包含 Bedrock 调用权限（如 bedrock:InvokeModel）
# 3. 使用 eksctl 或 AWS Console 关联 IAM Role 与 ServiceAccount
#
# 使用 eksctl 创建：
#   eksctl create iamserviceaccount \
#     --name ccg-service-account \
#     --namespace default \
#     --cluster <your-cluster-name> \
#     --attach-policy-arn arn:aws:iam::aws:policy/AmazonBedrockFullAccess \
#     --approve \
#     --override-existing-serviceaccounts
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ccg-service-account
  namespace: default
  labels:
    app: ccgeteway
  annotations:
    # 替换为你的 IAM Role ARN
    eks.amazonaws.com/role-arn: arn:aws:iam::YOUR_ACCOUNT_ID:role/ccg-bedrock-role
